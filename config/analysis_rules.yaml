# NeuroScope Analysis Rules Configuration
# Defines thresholds and settings for the architecture linter

# Layer-level rules
layer_rules:
  missing_activation:
    enabled: true
    severity: CRITICAL

  sigmoid_in_deep_network:
    enabled: true
    severity: WARNING
    min_depth: 5  # Minimum network depth to trigger

  batch_norm_placement:
    enabled: true
    severity: WARNING
    min_conv_layers: 5  # Minimum conv layers without BN to trigger

  activation_after_final:
    enabled: true
    severity: INFO

# Architecture-level rules
architecture_rules:
  skip_connections:
    enabled: true
    severity: CRITICAL
    min_depth: 15  # Minimum layers without skip connections to trigger

  fc_parameter_explosion:
    enabled: true
    severity: WARNING
    max_params: 10000000  # 10M parameters threshold

  missing_dropout:
    enabled: true
    severity: WARNING

  premature_flatten:
    enabled: true
    severity: WARNING

# Efficiency rules
efficiency_rules:
  redundant_convs:
    enabled: true
    severity: INFO

  large_kernels:
    enabled: true
    severity: WARNING
    max_kernel_size: 7

  no_pooling:
    enabled: true
    severity: WARNING
    min_conv_layers: 3

# Hardware presets for training time estimation
hardware_presets:
  T4:
    fp32_tflops: 8.1
    fp16_tflops: 65
    memory_gb: 16
  V100:
    fp32_tflops: 15.7
    fp16_tflops: 125
    memory_gb: 32
  A100:
    fp32_tflops: 19.5
    fp16_tflops: 312
    memory_gb: 80
  RTX3090:
    fp32_tflops: 35.6
    fp16_tflops: 71
    memory_gb: 24
  RTX4090:
    fp32_tflops: 82.6
    fp16_tflops: 165
    memory_gb: 24
  CPU:
    fp32_tflops: 0.5
    fp16_tflops: 0.5
    memory_gb: 0
