<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroScope Builder — Prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080810;
  color: #e0e0e0;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  height: 100vh;
  cursor: default;
}

#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* === TOP BAR === */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: linear-gradient(180deg, rgba(12,12,25,0.95) 0%, rgba(8,8,18,0.9) 100%);
  border-bottom: 1px solid rgba(0,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.topbar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,255,0.3), transparent);
}
.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 16px;
  background: linear-gradient(135deg, #00ffff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}
.topbar-center {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(0,255,255,0.5);
  letter-spacing: 2px;
}
.topbar-right {
  display: flex;
  gap: 12px;
  align-items: center;
}
.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #00ff88;
  box-shadow: 0 0 8px rgba(0,255,136,0.5);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.topbar-btn {
  background: rgba(0,255,255,0.06);
  border: 1px solid rgba(0,255,255,0.15);
  color: rgba(0,255,255,0.7);
  padding: 5px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.topbar-btn:hover {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
  box-shadow: 0 0 12px rgba(0,255,255,0.15);
}

/* === MODEL SELECTOR === */
.model-selector {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 90;
}
.selector-step {
  background: rgba(10,10,20,0.85);
  border: 1px solid rgba(0,255,255,0.12);
  border-radius: 6px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 100px;
}
.selector-step .step-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  letter-spacing: 2px;
  color: rgba(0,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.selector-step:hover {
  border-color: rgba(0,255,255,0.35);
  background: rgba(0,255,255,0.06);
}
.selector-step.active {
  border-color: rgba(0,255,255,0.5);
  box-shadow: 0 0 12px rgba(0,255,255,0.15);
}
.selector-step .step-value {
  color: #e0e0e0;
}
.selector-arrow {
  color: rgba(0,255,255,0.25);
  font-size: 16px;
}

/* === DROPDOWN MENU === */
.dropdown-menu {
  position: fixed;
  background: rgba(10,10,22,0.96);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 8px;
  padding: 6px 0;
  z-index: 200;
  min-width: 180px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.05);
  display: none;
}
.dropdown-menu.show { display: block; }
.dropdown-item {
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dropdown-item:hover {
  background: rgba(0,255,255,0.08);
  color: #00ffff;
}
.dropdown-item.selected {
  color: #00ff88;
  background: rgba(0,255,136,0.06);
}
.dropdown-item .item-hint {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  margin-left: auto;
}

/* === RIGHT PANEL — SPECS === */
.specs-panel {
  position: fixed;
  top: 48px; right: 0; bottom: 0;
  width: 300px;
  background: linear-gradient(180deg, rgba(12,12,22,0.96), rgba(6,6,14,0.98));
  border-left: 1px solid rgba(0,255,255,0.08);
  z-index: 80;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(10px);
}
.specs-panel.open { transform: translateX(0); }
.specs-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, rgba(0,255,255,0.2), transparent 30%, transparent 70%, rgba(255,0,100,0.2));
}
.panel-header {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,255,255,0.6);
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(0,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
}
.panel-close:hover { color: #ff0064; }
.spec-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.2s;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.spec-item:hover {
  background: rgba(0,255,255,0.05);
}
.spec-item .spec-icon {
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.spec-item .spec-name {
  font-weight: 600;
  font-size: 13px;
}
.spec-item .spec-desc {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  font-family: 'Share Tech Mono', monospace;
}
.spec-item.opt-green .spec-icon {
  background: rgba(0,255,136,0.1);
  border: 1px solid rgba(0,255,136,0.25);
}
.spec-item.opt-purple .spec-icon {
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.25);
}
.spec-item.opt-yellow .spec-icon {
  background: rgba(255,200,0,0.1);
  border: 1px solid rgba(255,200,0,0.25);
}
.spec-item.selected-spec {
  background: rgba(0,255,136,0.08);
  border-left: 2px solid #00ff88;
}

/* === CODE NOTEBOOK === */
.notebook {
  position: fixed;
  top: 56px;
  right: 16px;
  width: 380px;
  max-height: 44px;
  background: rgba(8,8,18,0.95);
  border: 1px solid rgba(0,255,255,0.1);
  border-radius: 8px;
  z-index: 85;
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(10px);
}
.notebook.expanded { max-height: 450px; }
.notebook-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid rgba(0,255,255,0.06);
}
.notebook-header span {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(0,255,255,0.5);
}
.notebook-toggle {
  font-size: 12px;
  color: rgba(0,255,255,0.3);
  transition: transform 0.3s;
}
.notebook.expanded .notebook-toggle { transform: rotate(180deg); }
.notebook-body {
  padding: 4px 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  line-height: 1.8;
  max-height: 380px;
  overflow-y: auto;
}
.code-line {
  padding: 1px 14px;
  display: flex;
  gap: 10px;
  min-height: 20px;
}
.code-line:hover { background: rgba(0,255,255,0.03); }
.line-num {
  color: rgba(255,255,255,0.12);
  min-width: 22px;
  text-align: right;
  user-select: none;
}
.line-content { flex: 1; }
.code-kw { color: #ff0064; }
.code-str { color: #ffc800; }
.code-fn { color: #00ff88; }
.code-comment { color: rgba(255,255,255,0.18); }
.code-injected {
  color: rgba(0,255,255,0.65);
  animation: injectFlash 0.6s ease-out;
}
@keyframes injectFlash {
  0% { background: rgba(0,255,255,0.15); }
  100% { background: transparent; }
}
.code-placeholder { color: rgba(255,255,255,0.1); font-style: italic; }

/* === HUD === */
.hud-bottom {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(0,255,255,0.25);
  letter-spacing: 1px;
  z-index: 80;
  text-align: center;
}

/* === TOOLTIP === */
.tooltip-3d {
  position: fixed;
  background: rgba(10,10,22,0.95);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  z-index: 150;
  pointer-events: none;
  display: none;
  backdrop-filter: blur(8px);
  max-width: 200px;
}
.tooltip-3d .tt-name {
  font-weight: 700;
  color: #00ffff;
  margin-bottom: 2px;
}
.tooltip-3d .tt-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.12); border-radius: 2px; }
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">NEUROSCOPE</div>
  <div class="topbar-center">BUILDER PROTOTYPE</div>
  <div class="topbar-right">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span style="color: rgba(0,255,136,0.6)" id="status-text">READY</span>
    </div>
    <button class="topbar-btn" onclick="resetAll()">Reset</button>
  </div>
</div>

<!-- MODEL SELECTOR -->
<div class="model-selector">
  <div class="selector-step" id="sel-family" onclick="showDropdown('family', this)">
    <span class="step-label">Family</span>
    <span class="step-value" id="sel-family-val">Select...</span>
  </div>
  <span class="selector-arrow">▸</span>
  <div class="selector-step" id="sel-version" onclick="showDropdown('version', this)">
    <span class="step-label">Version</span>
    <span class="step-value" id="sel-version-val">—</span>
  </div>
  <span class="selector-arrow">▸</span>
  <div class="selector-step" id="sel-size" onclick="showDropdown('size', this)">
    <span class="step-label">Size</span>
    <span class="step-value" id="sel-size-val">—</span>
  </div>
</div>

<!-- DROPDOWN -->
<div class="dropdown-menu" id="dropdown"></div>

<!-- SPECS PANEL -->
<div class="specs-panel" id="specs-panel">
  <div class="panel-header">
    <span id="panel-title">SELECT SPEC</span>
    <button class="panel-close" onclick="closeSpecsPanel()">✕</button>
  </div>
  <div id="spec-options"></div>
</div>

<!-- CODE NOTEBOOK -->
<div class="notebook" id="notebook">
  <div class="notebook-header" onclick="document.getElementById('notebook').classList.toggle('expanded')">
    <span>📓 CODE PREVIEW</span>
    <span class="notebook-toggle">▼</span>
  </div>
  <div class="notebook-body" id="code-body"></div>
</div>

<!-- TOOLTIP -->
<div class="tooltip-3d" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-status" id="tt-status"></div>
</div>

<!-- HUD -->
<div class="hud-bottom">CLICK EXTENSIONS TO CONFIGURE · DRAG TO ROTATE · SCROLL TO ZOOM</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// NEUROSCOPE BUILDER PROTOTYPE
// ============================================================

// --- STATE ---
const state = {
  family: null,     // 'YOLO', 'ResNet', etc.
  version: null,    // 'v11', 'v10', etc.
  size: null,       // 'n', 's', 'm', 'l', 'x'
  coreOn: false,
  extensions: {
    optimizer:    { value: null, color: 0x00ff88, category: 'green', label: 'OPTIMIZER',    icon: '🔧', position: [-4, 1.5, 0] },
    activation:   { value: null, color: 0x00ff88, category: 'green', label: 'ACTIVATION',   icon: '⚡', position: [-4, 0, 0] },
    loss:         { value: null, color: 0x00ff88, category: 'green', label: 'LOSS FUNCTION', icon: '🎯', position: [-4, -1.5, 0] },
    augmentation: { value: null, color: 0xa855f7, category: 'purple', label: 'AUGMENTATION', icon: '🎲', position: [4, 1.5, 0] },
    nms:          { value: null, color: 0xa855f7, category: 'purple', label: 'NMS',          icon: '📐', position: [4, 0, 0] },
    resolution:   { value: null, color: 0xffc800, category: 'yellow', label: 'RESOLUTION',   icon: '📏', position: [4, -1.5, 0] },
  }
};

// --- SPECS DATA ---
const specsData = {
  optimizer: [
    { id: 'adamw', name: 'AdamW', desc: 'Adam + weight decay — best default', code: "optimizer='AdamW'" },
    { id: 'adam', name: 'Adam', desc: 'Adaptive learning rate', code: "optimizer='Adam'" },
    { id: 'sgd', name: 'SGD', desc: 'Stochastic gradient descent — classic', code: "optimizer='SGD'" },
    { id: 'rmsprop', name: 'RMSprop', desc: 'Good for RNNs, adaptive lr', code: "optimizer='RMSprop'" },
  ],
  activation: [
    { id: 'silu', name: 'SiLU', desc: 'Sigmoid Linear Unit — YOLO default', code: "activation='SiLU'" },
    { id: 'relu', name: 'ReLU', desc: 'Classic — fast, simple', code: "activation='ReLU'" },
    { id: 'mish', name: 'Mish', desc: 'Self-regularizing, smoother gradients', code: "activation='Mish'" },
    { id: 'gelu', name: 'GELU', desc: 'Gaussian Error Linear Unit — Transformer default', code: "activation='GELU'" },
  ],
  loss: [
    { id: 'ciou', name: 'CIoU Loss', desc: 'Complete IoU — best for bbox regression', code: "loss='CIoU'" },
    { id: 'crossentropy', name: 'CrossEntropy', desc: 'Standard classification loss', code: "loss='CrossEntropy'" },
    { id: 'focal', name: 'Focal Loss', desc: 'Handles class imbalance', code: "loss='Focal'" },
    { id: 'diou', name: 'DIoU Loss', desc: 'Distance IoU — faster convergence', code: "loss='DIoU'" },
  ],
  augmentation: [
    { id: 'mosaic', name: 'Mosaic', desc: '4-image grid augmentation', code: "mosaic=0.0" },
    { id: 'mixup', name: 'MixUp', desc: 'Blend two images + labels', code: "mixup=0.15" },
    { id: 'copypaste', name: 'CopyPaste', desc: 'Copy objects onto new backgrounds', code: "copy_paste=0.1" },
    { id: 'hsv', name: 'HSV Jitter', desc: 'Hue, saturation, value augmentation', code: "hsv_h=0.015, hsv_s=0.7, hsv_v=0.4" },
  ],
  nms: [
    { id: 'nms_default', name: 'NMS (Default)', desc: 'conf=0.25, iou=0.45', code: "conf=0.25, iou=0.45" },
    { id: 'nms_strict', name: 'NMS (Strict)', desc: 'conf=0.4, iou=0.3 — fewer false positives', code: "conf=0.4, iou=0.3" },
    { id: 'nms_loose', name: 'NMS (Loose)', desc: 'conf=0.1, iou=0.6 — catch more objects', code: "conf=0.1, iou=0.6" },
  ],
  resolution: [
    { id: 'imgsz_640', name: '640px', desc: 'Fast — good for real-time', code: "imgsz=640" },
    { id: 'imgsz_800', name: '800px', desc: 'Balanced — recommended', code: "imgsz=800" },
    { id: 'imgsz_1024', name: '1024px', desc: 'High detail — slower training', code: "imgsz=1024" },
    { id: 'imgsz_1280', name: '1280px', desc: 'Maximum detail — for small defects', code: "imgsz=1280" },
  ],
};

const familyOptions = [
  { id: 'yolo', name: 'YOLO', versions: ['v8', 'v9', 'v10', 'v11'] },
  { id: 'resnet', name: 'ResNet', versions: ['18', '34', '50', '101'] },
  { id: 'efficientnet', name: 'EfficientNet', versions: ['B0', 'B1', 'B2', 'B3'] },
];
const sizeOptions = ['n', 's', 'm', 'l', 'x'];

// --- CODE STATE ---
let codeLines = [];
let lineCounter = 0;

function addCodeLine(text, injected = false) {
  lineCounter++;
  codeLines.push({ num: lineCounter, text, injected });
  renderCode();
}

function renderCode() {
  const body = document.getElementById('code-body');
  body.innerHTML = codeLines.map(l => {
    let colored = l.text
      .replace(/(from|import|def|class|return|=)/g, '<span class="code-kw">$1</span>')
      .replace(/('[^']*')/g, '<span class="code-str">$1</span>')
      .replace(/(#[^\n]*)/g, '<span class="code-comment">$1</span>');
    return `<div class="code-line"><span class="line-num">${l.num}</span><span class="line-content ${l.injected ? 'code-injected' : ''}">${colored}</span></div>`;
  }).join('');
  body.scrollTop = body.scrollHeight;
}

// Initial placeholder
function initCode() {
  codeLines = [];
  lineCounter = 0;
  addCodeLine('# Select a model family to begin...', false);
  renderCode();
}

// --- THREE.JS SETUP ---
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080810);
scene.fog = new THREE.FogExp2(0x080810, 0.035);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 10);
camera.lookAt(0, 0, 0);

// --- LIGHTS ---
const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0x4466aa, 0.3);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);

// --- GRID ---
const gridHelper = new THREE.GridHelper(40, 40, 0x0a1a2a, 0x0a1a2a);
gridHelper.position.y = -3;
scene.add(gridHelper);

// --- PARTICLES ---
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 30;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.04, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// --- ORBIT CONTROLS (manual) ---
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 2.5, radius: 10 };

canvas.addEventListener('mousedown', (e) => { if (e.button === 0 && !e.target.closest('.ui')) { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; } });
canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  spherical.theta -= dx * 0.005;
  spherical.phi = Math.max(0.3, Math.min(Math.PI - 0.3, spherical.phi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('wheel', (e) => {
  spherical.radius = Math.max(5, Math.min(20, spherical.radius + e.deltaY * 0.01));
});

function updateCamera() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);
}

// --- 3D OBJECTS ---

// Core Engine
const coreGeo = new THREE.BoxGeometry(2, 2, 2);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  emissive: 0x000000,
  emissiveIntensity: 0,
  metalness: 0.8,
  roughness: 0.3,
  transparent: true,
  opacity: 0.9,
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
scene.add(coreMesh);

// Core wireframe
const coreWireGeo = new THREE.EdgesGeometry(coreGeo);
const coreWireMat = new THREE.LineBasicMaterial({ color: 0x112233, transparent: true, opacity: 0.3 });
const coreWire = new THREE.LineSegments(coreWireGeo, coreWireMat);
coreMesh.add(coreWire);

// Core glow (point light inside)
const coreGlow = new THREE.PointLight(0x00c8ff, 0, 5);
coreMesh.add(coreGlow);

// Core label sprite
function createTextSprite(text, color = '#00c8ff', size = 0.4) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 28px Orbitron, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(size * 2, size * 0.5, 1);
  return sprite;
}

const coreLabel = createTextSprite('NO MODEL', '#334455', 0.35);
coreLabel.position.y = 1.6;
coreMesh.add(coreLabel);

// --- EXTENSIONS ---
const extensionMeshes = {};
const extensionCables = {};
const extensionLabels = {};

Object.entries(state.extensions).forEach(([key, ext]) => {
  // Extension cube
  const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x111118,
    emissive: 0x000000,
    emissiveIntensity: 0,
    metalness: 0.7,
    roughness: 0.4,
    transparent: true,
    opacity: 0.7,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...ext.position);
  mesh.userData = { key, type: 'extension' };
  scene.add(mesh);

  // Wireframe
  const wireGeo = new THREE.EdgesGeometry(geo);
  const wireMat = new THREE.LineBasicMaterial({ color: 0x222233, transparent: true, opacity: 0.2 });
  const wire = new THREE.LineSegments(wireGeo, wireMat);
  mesh.add(wire);

  // Glow light (off initially)
  const glow = new THREE.PointLight(ext.color, 0, 3);
  mesh.add(glow);

  // Label
  const label = createTextSprite(ext.label, '#223344', 0.2);
  label.position.y = 0.7;
  mesh.add(label);

  extensionMeshes[key] = { mesh, glow, mat, wireMat, label };

  // Cable (line from extension to core)
  const start = new THREE.Vector3(...ext.position);
  const end = new THREE.Vector3(0, 0, 0);
  const mid = new THREE.Vector3().lerpVectors(start, end, 0.5);
  mid.y += 0.5;
  const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
  const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.03, 8, false);
  const tubeMat = new THREE.MeshBasicMaterial({ color: 0x111122, transparent: true, opacity: 0.15 });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(tube);
  extensionCables[key] = { mesh: tube, mat: tubeMat };
});

// --- RAYCASTING ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredExtension = null;
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = Object.values(extensionMeshes).map(m => m.mesh);
  if (state.coreOn) meshes.push(coreMesh);
  const intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    canvas.style.cursor = 'pointer';

    if (obj.userData.type === 'extension') {
      const key = obj.userData.key;
      const ext = state.extensions[key];
      hoveredExtension = key;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      document.getElementById('tt-name').textContent = ext.label;
      document.getElementById('tt-status').textContent = ext.value ? `✓ ${ext.value}` : 'Click to configure';
    } else if (obj === coreMesh) {
      hoveredExtension = null;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      document.getElementById('tt-name').textContent = state.family ? `${state.family}${state.version}${state.size}` : 'Core Engine';
      document.getElementById('tt-status').textContent = state.coreOn ? '✓ Active' : 'Select a model';
    }
  } else {
    canvas.style.cursor = 'default';
    hoveredExtension = null;
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('click', (e) => {
  if (isDragging) return;
  raycaster.setFromCamera(mouse, camera);
  const meshes = Object.values(extensionMeshes).map(m => m.mesh);
  const intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.type === 'extension' && state.coreOn) {
      openSpecsPanel(obj.userData.key);
    }
  }
});

// --- SPECS PANEL ---
function openSpecsPanel(key) {
  const ext = state.extensions[key];
  const options = specsData[key];
  if (!options) return;

  document.getElementById('panel-title').textContent = ext.label;
  const container = document.getElementById('spec-options');
  container.innerHTML = options.map(opt => `
    <div class="spec-item opt-${ext.category} ${ext.value === opt.name ? 'selected-spec' : ''}" onclick="selectSpec('${key}', '${opt.id}')">
      <div class="spec-icon">${ext.icon}</div>
      <div>
        <div class="spec-name">${opt.name}</div>
        <div class="spec-desc">${opt.desc}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('specs-panel').classList.add('open');
}

function closeSpecsPanel() {
  document.getElementById('specs-panel').classList.remove('open');
}

function selectSpec(key, optionId) {
  const options = specsData[key];
  const opt = options.find(o => o.id === optionId);
  if (!opt) return;

  state.extensions[key].value = opt.name;
  activateExtension(key);
  closeSpecsPanel();

  // Inject code
  const ext = state.extensions[key];
  addCodeLine(`# ─── ${ext.label} ───`, false);
  addCodeLine(opt.code, true);

  updateHUD();
}

function activateExtension(key) {
  const ext = state.extensions[key];
  const data = extensionMeshes[key];
  const cable = extensionCables[key];

  // Extension glow
  data.mat.emissive.setHex(ext.color);
  data.mat.emissiveIntensity = 0.3;
  data.mat.opacity = 1;
  data.glow.intensity = 1.5;
  data.wireMat.color.setHex(ext.color);
  data.wireMat.opacity = 0.6;

  // Update label
  data.mesh.remove(data.label);
  const newColor = ext.category === 'green' ? '#00ff88' : ext.category === 'purple' ? '#a855f7' : '#ffc800';
  data.label = createTextSprite(opt_name(key), newColor, 0.2);
  data.label.position.y = 0.7;
  data.mesh.add(data.label);

  // Cable glow
  cable.mat.color.setHex(ext.color);
  cable.mat.opacity = 0.7;
}

function opt_name(key) {
  return state.extensions[key].value || state.extensions[key].label;
}

// --- CORE ACTIVATION ---
function activateCore() {
  state.coreOn = true;
  coreMat.emissive.setHex(0x00c8ff);
  coreMat.emissiveIntensity = 0.15;
  coreMat.color.setHex(0x0a1a3a);
  coreGlow.intensity = 2;
  coreWireMat.color.setHex(0x00c8ff);
  coreWireMat.opacity = 0.6;

  coreMesh.remove(coreLabel);
  const name = `${state.family}${state.version}${state.size}`;
  coreLabel = createTextSprite(name, '#00c8ff', 0.35);
  coreLabel.position.y = 1.6;
  coreMesh.add(coreLabel);

  // Inject model code
  codeLines = [];
  lineCounter = 0;
  addCodeLine("from ultralytics import YOLO", true);
  addCodeLine("", false);
  addCodeLine(`# Load ${name} architecture`, false);
  addCodeLine(`model = YOLO('yolo${state.version}.yaml')`, true);
  addCodeLine(`model.load('yolo${state.version}${state.size}.pt')`, true);
  addCodeLine("", false);
  addCodeLine("# Configure model specs ↓", false);

  document.getElementById('status-text').textContent = 'CONFIGURING';
  document.getElementById('status-text').style.color = '#ffc800';
}

// --- DROPDOWN ---
let activeDropdown = null;

function showDropdown(type, el) {
  const dd = document.getElementById('dropdown');
  let items = [];

  if (type === 'family') {
    items = familyOptions.map(f => ({ id: f.id, name: f.name, hint: `${f.versions.length} versions` }));
  } else if (type === 'version') {
    if (!state.family) return;
    const fam = familyOptions.find(f => f.id === state.family);
    items = fam.versions.map(v => ({ id: v, name: `${fam.name} ${v}`, hint: '' }));
  } else if (type === 'size') {
    if (!state.version) return;
    items = sizeOptions.map(s => ({ id: s, name: s.toUpperCase(), hint: s === 'n' ? 'Nano' : s === 's' ? 'Small' : s === 'm' ? 'Medium' : s === 'l' ? 'Large' : 'XLarge' }));
  }

  dd.innerHTML = items.map(item => `
    <div class="dropdown-item" onclick="selectDropdown('${type}', '${item.id}')">${item.name} <span class="item-hint">${item.hint}</span></div>
  `).join('');

  const rect = el.getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.classList.add('show');
  activeDropdown = type;
}

function selectDropdown(type, value) {
  document.getElementById('dropdown').classList.remove('show');

  if (type === 'family') {
    state.family = familyOptions.find(f => f.id === value).name;
    state.version = null;
    state.size = null;
    document.getElementById('sel-family-val').textContent = state.family;
    document.getElementById('sel-family').classList.add('active');
    document.getElementById('sel-version-val').textContent = 'Select...';
    document.getElementById('sel-size-val').textContent = '—';
    initCode();
  } else if (type === 'version') {
    state.version = value;
    state.size = null;
    document.getElementById('sel-version-val').textContent = `${state.family} ${value}`;
    document.getElementById('sel-version').classList.add('active');
    document.getElementById('sel-size-val').textContent = 'Select...';
  } else if (type === 'size') {
    state.size = value;
    document.getElementById('sel-size-val').textContent = value.toUpperCase();
    document.getElementById('sel-size').classList.add('active');
    activateCore();
  }
}

// Close dropdown on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.selector-step') && !e.target.closest('.dropdown-menu')) {
    document.getElementById('dropdown').classList.remove('show');
  }
});

// --- HUD ---
function updateHUD() {
  const filled = Object.values(state.extensions).filter(e => e.value).length;
  const total = Object.keys(state.extensions).length;
  document.getElementById('status-text').textContent = filled === total ? 'COMPLETE' : `${filled}/${total} SPECS`;

  if (filled === total) {
    document.getElementById('status-text').style.color = '#00ff88';
    addCodeLine("", false);
    addCodeLine("# ✅ Model configured — add dataset & run!", false);
  }
}

// --- RESET ---
function resetAll() {
  state.family = null;
  state.version = null;
  state.size = null;
  state.coreOn = false;
  Object.values(state.extensions).forEach(e => { e.value = null; });

  // Reset core
  coreMat.emissive.setHex(0x000000);
  coreMat.emissiveIntensity = 0;
  coreMat.color.setHex(0x111122);
  coreGlow.intensity = 0;
  coreWireMat.color.setHex(0x112233);
  coreWireMat.opacity = 0.3;
  coreMesh.remove(coreLabel);
  coreLabel = createTextSprite('NO MODEL', '#334455', 0.35);
  coreLabel.position.y = 1.6;
  coreMesh.add(coreLabel);

  // Reset extensions
  Object.entries(extensionMeshes).forEach(([key, data]) => {
    data.mat.emissive.setHex(0x000000);
    data.mat.emissiveIntensity = 0;
    data.mat.opacity = 0.7;
    data.glow.intensity = 0;
    data.wireMat.color.setHex(0x222233);
    data.wireMat.opacity = 0.2;
    data.mesh.remove(data.label);
    data.label = createTextSprite(state.extensions[key].label, '#223344', 0.2);
    data.label.position.y = 0.7;
    data.mesh.add(data.label);
  });

  // Reset cables
  Object.values(extensionCables).forEach(c => {
    c.mat.color.setHex(0x111122);
    c.mat.opacity = 0.15;
  });

  // Reset UI
  document.getElementById('sel-family').classList.remove('active');
  document.getElementById('sel-version').classList.remove('active');
  document.getElementById('sel-size').classList.remove('active');
  document.getElementById('sel-family-val').textContent = 'Select...';
  document.getElementById('sel-version-val').textContent = '—';
  document.getElementById('sel-size-val').textContent = '—';
  document.getElementById('status-text').textContent = 'READY';
  document.getElementById('status-text').style.color = '#00ff88';

  closeSpecsPanel();
  initCode();
}

// --- ANIMATION LOOP ---
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  updateCamera();

  // Subtle core rotation
  if (state.coreOn) {
    coreMesh.rotation.y = Math.sin(time * 0.5) * 0.1;
    coreMesh.rotation.x = Math.sin(time * 0.3) * 0.05;
  }

  // Extension hover pulse
  Object.entries(extensionMeshes).forEach(([key, data]) => {
    if (state.extensions[key].value) {
      data.glow.intensity = 1.5 + Math.sin(time * 2 + Object.keys(extensionMeshes).indexOf(key)) * 0.3;
    }
    if (key === hoveredExtension && !state.extensions[key].value && state.coreOn) {
      data.mat.emissive.setHex(0x00c8ff);
      data.mat.emissiveIntensity = 0.1 + Math.sin(time * 4) * 0.05;
    } else if (!state.extensions[key].value) {
      data.mat.emissive.setHex(0x000000);
      data.mat.emissiveIntensity = 0;
    }
  });

  // Particle drift
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3 + 1] += Math.sin(time + i) * 0.002;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Core glow pulse
  if (state.coreOn) {
    coreGlow.intensity = 2 + Math.sin(time * 2) * 0.5;
  }

  renderer.render(scene, camera);
}

// --- RESIZE ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- INIT ---
initCode();
animate();
</script>
</body>
</html>
