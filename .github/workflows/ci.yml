name: NeuroScope CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Lint & Test — Python Backend
  # ──────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/ --output-format=github

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx pyyaml

      - name: Run model config tests
        run: pytest tests/test_models/ -v --tb=short

      - name: Run export tests
        run: pytest tests/test_export/ -v --tb=short

      - name: Run API tests
        run: pytest tests/test_api/ -v --tb=short --cov=src --cov-report=term-missing

  # ──────────────────────────────────────────────
  # Lint & Build — Frontend
  # ──────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Non-blocking until lint rules are finalized

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Docker — Build Verification
  # ──────────────────────────────────────────────
  docker-backend:
    name: Docker Build — Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t neuroscope-backend:ci .

      - name: Verify image runs
        run: |
          docker run --rm -d --name backend-test -p 8000:8000 neuroscope-backend:ci
          sleep 5
          curl -f http://localhost:8000/health
          docker stop backend-test

  docker-frontend:
    name: Docker Build — Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t neuroscope-frontend:ci ./frontend

      - name: Verify image runs
        run: |
          docker run --rm -d --name frontend-test -p 3000:80 neuroscope-frontend:ci
          sleep 3
          curl -f http://localhost:3000/
          docker stop frontend-test
